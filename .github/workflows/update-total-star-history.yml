name: Update Total Star History

on:
  workflow_dispatch:
  schedule:
    - cron: "2-59/5 * * * *"

permissions:
  contents: write

concurrency:
  group: update-total-star-history
  cancel-in-progress: true

jobs:
  update-star-history:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate total star history
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STAR_HISTORY_USERNAME: liu-ry
          STAR_HISTORY_INCLUDE_FORKS: "true"
          STAR_HISTORY_INCLUDE_PRIVATE: "false"
        run: python .github/scripts/generate_total_star_history.py

      - name: Add star race animation
        run: node scripts/inject-star-race-animation.mjs

      - name: Commit updated chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain -- assets/github-stars-total.svg)" ]; then
            echo "No star history changes to commit."
            exit 0
          fi
          git add assets/github-stars-total.svg
          git commit -m "chore: update total star history"
          git push
